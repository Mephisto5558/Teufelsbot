<!doctype html>
<!-- eslint-disable-next-line @html-eslint/no-inline-styles -- removed via js when page loaded-->
<html style='visibility: hidden; background-color: darkslategrey' lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Sudoku</title>

  <style>
    /* removed via js when page loaded */
    html {
      visibility: hidden;
      background-color: darkslategrey;
    }
  </style>
  <script type='module' src='https://mephisto5558.github.io/Website-Assets/min/js/loadLocal.js'
    crossorigin='anonymous'
    integrity='sha512-IL2N5uhzIsawjoT0vUhAnTdepolE5GSYCCl2dLpuft14MSu7xlYgOLblfJvkMOXMmTvUQpSdkaBXAs4r0xo8Dw==' onload="
        globalThis.loadLocal('css', '/css/sudoku.css', 'https://mephisto5558.github.io/Website-Assets/min/css/sudoku.css');
        globalThis.loadLocal('css', '/css/sudoku-mobile.css', 'https://mephisto5558.github.io/Website-Assets/min/css/sudoku-mobile.css', { media: '(max-width: 600px)', });
        globalThis.loadLocal('script', '../../min/js/sudoku/index.js', 'https://mephisto5558.github.io/Website-Assets/min/js/sudoku/index.js', { type: 'module', defer: true });
        delete globalThis.loadLocal;
      ">
  </script>
  <link rel='icon' type='image/x-icon' href='https://mephisto5558.github.io/Website-Assets/img/favicons/sudoku.svg'>

  <meta name='description' content='A simple Sudoku game with configurable size and difficulty.'>
</head>
<body>
  <header>
    <!-- eslint-disable-next-line @html-eslint/no-invalid-attr-value -- false positive -->
    <time id='timer' datetime='PT0S'></time>
    <h1>Sudoku of the day</h1>
    <div id='color-switcher-container'>
      <div id='bg-color'>
        <label for='bg-color-switch'>Switch BG Color</label>
        <!-- eslint-disable-next-line @html-eslint/use-baseline -- only android firefox does not support it fully -->
        <input id='bg-color-switch' type='color' autocomplete='off' data-css-property='--background-color'></input>
      </div>
      <div id='fg-color'>
        <label for='fg-color-switch'>Switch Text Color</label>
        <!-- eslint-disable-next-line @html-eslint/use-baseline -- only android firefox does not support it fully -->
        <input id='fg-color-switch' type='color' autocomplete='off' data-css-property='--foreground-color'></input>
      </div>
    </div>
  </header>

  <div id='loading-container'>
    <h2>Loading Sudoku...</h2>
    <p id='loading-status' aria-label='Loading status info'></p>
    <button id='cancel-loading' type='button'>Cancel</button>
  </div>

  <div id='popup-container'>
    <h3 aria-label='Popup title'></h3>
    <p aria-label='Popup message'></p>
  </div>

  <main id='sudoku-container'>
    <table id='sudoku'></table>
    <table id='number-overview'></table>
    <button id='toggle-notes-btn' type='button'>Enable Notes Mode</button>

    <div id='settings-container'>
      <label for='difficulty-slider'>Holes</label>
      <input id='difficulty-slider' type='range' list='difficulty-labels' title='Applied to the next generated Sudoku.'>
      <output for='difficulty-slider' aria-label='Selected difficulty'></output>

      <!-- eslint-disable-next-line @html-eslint/use-baseline -- only android firefox does not support it fully -->
      <datalist id='difficulty-labels'>
        <option value='Easy'>Easy</option>
        <option value='Hard'>Hard</option>
      </datalist>

      <div id='size-option-container'>
        <label for='size-option'>Box Size (x*x)</label>
        <input id='size-option' type='number' autocomplete='off' min='2' step='1'>
        <div id='stepper-buttons'>
          <button id='stepper-up' type='button' aria-label='Increase size'>+</button>
          <button id='stepper-down' type='button' aria-label='Decrease size'>-</button>
        </div>
      </div>
    </div>

    <div id='btn-container'>
      <button id='solution-btn' type='button'>Show Solution</button>
      <button id='regenerate-btn' type='button'>Generate new</button>
      <button id='share-btn' type='button'>Share Sudoku</button>
    </div>

    <div id='message-container'>
      <p id='error-info'>There is a duplicate number in the red area.</p>
      <p id='win-info'>You won! Click the button above to generate a new Sudoku.</p>
    </div>
  </main>
</body>
</html>
