<!doctype html>
<html lang='en'>

<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Voting</title>
  <script src='https://cdn.jsdelivr.net/npm/sweetalert2@11.26.4'
    crossorigin='anonymous'
    integrity='sha512-yegqH1z+aPz99cJLOL6wSAln3VK2ndIMTLSXgE5MQ/3PE0oxlKwMuHtzKsIGuShqTYlpgAhsGqVu8XA6g6BVdQ==' async></script>
  <style>
    body {
      background-color: black;
    }
  </style>
  <link rel='preload' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css' crossorigin='anonymous'
    onload="this.onload=null;this.rel='stylesheet'" as='style'>
  <link rel='preload' href='https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark/dark.min.css' crossorigin='anonymous'
    onload="this.onload=null;this.rel='stylesheet'" as='style'>

  <script type='module' src='https://mephisto5558.github.io/Website-Assets/min/js/loadLocal.js'
    crossorigin='anonymous'
    integrity='sha512-IL2N5uhzIsawjoT0vUhAnTdepolE5GSYCCl2dLpuft14MSu7xlYgOLblfJvkMOXMmTvUQpSdkaBXAs4r0xo8Dw==' onload="
      globalThis.loadLocal('css', '/css/vote.css', 'https://mephisto5558.github.io/Website-Assets/min/css/vote.css');
      globalThis.loadLocal('script', '../../min/js/vote/index.js', 'https://mephisto5558.github.io/Website-Assets/min/js/vote/index.js', { type: 'module', defer: true });
      delete globalThis.loadLocal;
    ">
  </script>

  <meta name='description'
    content="Teufelsbot's feature request voting page, full of stuff the developers will never have time to finish.">
</head>

<body>
  <div id='header-container'>
    <a href='?'>
      <h1>Feature Requests</h1>
    </a>
    <button id='toggle-cards-display' class='grey-hover' type='button' aria-label='Toggle display mode' title='Toggle display mode'>
      <i class='fas fa-gears' aria-hidden='true'></i>
    </button>
    <button id='toggle-color-scheme' class='grey-hover' type='button' aria-label='Toggle color scheme' title='Toggle color scheme'>
      <i class='fas fa-lightbulb' aria-hidden='true'></i>
    </button>
    <p id='feature-request-count'>
      Feature requests: <span>0</span>
    </p>
  </div>

  <div id='feature-request-overlay'>
    <div id='feature-request-modal'>
      <h2>Request a Feature</h2>
      <button id='feature-request-reset-btn' class='grey-hover' type='button' aria-label='Reset form'>
        <i class='fas fa-xmark' aria-hidden='true'></i>
      </button>
      <form id='feature-request-form' method='post'>
        <label for='feature-request-title'>Title:</label>
        <input id='feature-request-title' name='title' type='text' maxlength='140' required spellcheck>
        <span id='title-counter' class='counter'>&#8203;</span>
        <label for='feature-request-description'>Description:</label>
        <textarea id='feature-request-description' name='description' maxlength='4000' required spellcheck></textarea>
        <span id='description-counter' class='counter'>&#8203;</span>
        <button id='feature-request-submit-button' class='blue-button' type='button'>Submit</button>
      </form>
    </div>
  </div>

  <div id='cards-container-pending' class='cards-container'></div>
  <main id='cards-container' class='cards-container'></main>
</body>

</html>
